name: Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Download spaCy models
        run: |
          uv run python -m spacy download en_core_web_sm
          uv run python -m spacy download ja_core_news_sm
          uv run python -m spacy download xx_ent_wiki_sm

      - name: Download NLTK data
        run: |
          uv run python -m nltk.downloader punkt
          uv run python -m nltk.downloader averaged_perceptron_tagger
          uv run python -m nltk.downloader maxent_ne_chunker
          uv run python -m nltk.downloader words

      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=short --maxfail=5

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            test-results/
          retention-days: 7

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Run bandit security checks
        run: |
          uv run bandit -c bandit.yaml -r src/

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install pytest-cov

      - name: Download spaCy models
        run: |
          uv run python -m spacy download en_core_web_sm
          uv run python -m spacy download ja_core_news_sm
          uv run python -m spacy download xx_ent_wiki_sm

      - name: Download NLTK data
        run: |
          uv run python -m nltk.downloader punkt
          uv run python -m nltk.downloader averaged_perceptron_tagger
          uv run python -m nltk.downloader maxent_ne_chunker
          uv run python -m nltk.downloader words

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ --cov=src/risk_assessment --cov-report=xml --cov-report=html --cov-report=term
